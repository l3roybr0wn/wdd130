            </ul>
        </nav>
    </header>
    <main>
        <h1>Contact Us</h1>

        <section>
            <h2>Meet Our Team</h2>
            <div class="employee-container">
                <figure class="employee">
                    <img src="images/employee1.jpg" alt="Employee 1">
                    <figcaption>Jane Doe - Training Lead</figcaption>

                </figure>

                <figure class="employee">
                    <img src="images/employee2.jpg" alt="Employee 2">
                    <figcaption>John Smith - Head Guide</figcaption>

                </figure>

                <figure class="employee">
                    <img src="images/employee3.jpg" alt="Employee 3">
                    <figcaption>Sarah Jones - Equipment Specialist</figcaption>

                </figure>
            </div>
        </section>

        <div>

            <h2>Find Us</h2>
            <h3>2847 West 300 North</h3>
            <h3>West Point, Utah, 84015</h3>
            <h3>(801)111-1234</h3>
            <a href="mailto:myemail@raftingadventures.com">Email us for booking questions?</a>


        </div>
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3005.763331379482!2d-112.08250607772897!3d41.1178595646943!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x87531b1d09aad311%3A0xd74d9d7acc501c15!2s2847%20W%20300%20N%2C%20West%20Point%2C%20UT%2084015!5e0!3m2!1sen!2sus!4v1749489073163!5m2!1sen!2sus"
            width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"></iframe>


        <section>
            <h2>Contact Us - Have questions?</h2>
            <form action="submit.php" method="post">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" required>

                <label>Purpose of Message:</label>
                <div>
                    <input type="radio" id="general" name="purpose" value="General Inquiry" required>
                    <label for="general">General Inquiry</label><br>
                    <input type="radio" id="reservation" name="purpose" value="Reservation Question">
                    <label for="reservation">Reservation Question</label><br>
                    <input type="radio" id="suggestion" name="purpose" value="Website Suggestion">
                    <label for="suggestion">Website Suggestion</label>
                </div>

                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <div>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Please subscribe me to the monthly newsletter</label>
                </div>

                <button type="submit" value="submit">Get to Rafting</button>
            </form>
        </section>

    </main>
